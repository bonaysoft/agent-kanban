name = "agent-kanban"
main = "./worker/index.ts"
compatibility_date = "2026-04-13"
compatibility_flags = ["nodejs_compat"]
preview_urls = true

[vars]
ALLOWED_HOSTS = "agent-kanban.dev"
GITHUB_CLIENT_ID = "Ov23liryJHLmoT8019oo"
CF_ACCOUNT_ID = "94a89d03c0fc785c8dcbd3c674d6742a"

# Secrets (AUTH_SECRET, GITHUB_CLIENT_SECRET, MAILS_ADMIN_TOKEN, CF_API_TOKEN) are set via `wrangler secret put`
# Local dev overrides are in .dev.vars

[observability]
enabled = true

# Cap CPU time per request. Normal handlers are <100ms; 1000ms leaves
# headroom for the heaviest real query while killing runaway loops.
[limits]
cpu_ms = 1000

# Stale-sweep cron. Replaces per-request stale detection on hot paths.
# Every-minute cadence keeps the detection window aligned with
# MACHINE_STALE_TIMEOUT_MS (60s) — worst-case "online zombie" is ~2 min
# (one stale interval plus one cron period).
[triggers]
crons = ["* * * * *"]

[assets]
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*", "/.well-known/*", "/agents/*.gpg", "/share/*"]

[durable_objects]
bindings = [{ name = "TUNNEL_RELAY", class_name = "TunnelRelay" }]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["TunnelRelay"]

[[analytics_engine_datasets]]
binding = "AE"
dataset = "agent_kanban_metrics"

[[d1_databases]]
binding = "DB"
database_name = "agent-kanban-db"
database_id = "13cdf435-a99c-4744-9eca-9ed22b232581"
migrations_dir = "migrations"

# ----------------------------------------------------------------------------
# Staging environment — non-main branch builds via Workers Builds.
# CLOUDFLARE_ENV=staging is set automatically in the build script.
# vars and durable_objects are NOT inherited — must be redeclared.
# ----------------------------------------------------------------------------
[env.staging]

[env.staging.vars]
ALLOWED_HOSTS = "*.workers.dev"
GITHUB_CLIENT_ID = "Ov23liryJHLmoT8019oo"
CF_ACCOUNT_ID = "94a89d03c0fc785c8dcbd3c674d6742a"

[env.staging.durable_objects]
bindings = [{ name = "TUNNEL_RELAY", class_name = "TunnelRelay" }]

[env.staging.limits]
cpu_ms = 1000

[env.staging.triggers]
crons = ["* * * * *"]

[[env.staging.analytics_engine_datasets]]
binding = "AE"
dataset = "agent_kanban_metrics_staging"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "agent-kanban-db-staging"
database_id = "d12fc329-6105-437c-9580-bab26891b059"
migrations_dir = "migrations"
