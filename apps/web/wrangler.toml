name = "agent-kanban"
pages_build_output_dir = "dist"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ALLOWED_HOSTS = "agent-kanban.dev,agent-kanban-6zd.pages.dev"
GITHUB_CLIENT_ID = "Ov23liryJHLmoT8019oo"

# Secrets (AUTH_SECRET, GITHUB_CLIENT_SECRET) are set via `wrangler pages secret put`
# Local dev overrides are in .dev.vars

[observability]
enabled = true

[[d1_databases]]
binding = "DB"
database_name = "agent-kanban-db"
database_id = "13cdf435-a99c-4744-9eca-9ed22b232581"
migrations_dir = "migrations"

[env.preview]
compatibility_flags = ["nodejs_compat"]

[[env.preview.d1_databases]]
binding = "DB"
database_name = "agent-kanban-db-preview"
database_id = "d12fc329-6105-437c-9580-bab26891b059"

[env.preview.vars]
ALLOWED_HOSTS = "*.agent-kanban-6zd.pages.dev"
GITHUB_CLIENT_ID = "Ov23liryJHLmoT8019oo"
